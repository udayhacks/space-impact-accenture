<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Space impact</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #000008;
    --star1: #ffffff;
    --star2: #aaccff;
    --accent: #00eeff;
    --accent2: #ff3366;
    --accent3: #ffcc00;
    --ship: #44ddff;
    --enemy: #ff4466;
    --bullet: #00ffcc;
    --enemy-bullet: #ff8800;
    --shield: #88ffcc;
    --hud: #00eeff;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    font-family: 'Press Start 2P', monospace;
    overflow: hidden;
    user-select: none;
  }

  #game-wrapper {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  canvas {
    display: block;
    image-rendering: pixelated;
    border: 1px solid rgba(0,238,255,0.2);
    box-shadow: 0 0 40px rgba(0,238,255,0.08), 0 0 2px rgba(0,238,255,0.4);
  }

  #hud {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 4px;
    color: var(--hud);
    font-size: 8px;
    letter-spacing: 1px;
  }

  #hud .lives span { color: var(--accent2); }

  #overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,16,0.88);
    color: #fff;
    text-align: center;
    gap: 20px;
    pointer-events: none;
  }
  #overlay.hidden { display: none; }

  #overlay h1 {
    font-size: 22px;
    color: var(--accent);
    text-shadow: 0 0 16px var(--accent);
    letter-spacing: 2px;
    line-height: 1.5;
  }
  #overlay p {
    font-size: 8px;
    color: #aaa;
    line-height: 2;
  }
  #overlay .big-score {
    font-size: 14px;
    color: var(--accent3);
  }
  #overlay .blink {
    font-size: 9px;
    color: var(--accent);
    animation: blink 1s step-end infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  #mobile-controls {
    display: none;
    width: 100%;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0 0;
    gap: 8px;
  }

  .ctrl-btn {
    background: rgba(0,238,255,0.07);
    border: 1px solid rgba(0,238,255,0.25);
    color: var(--accent);
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    padding: 14px 18px;
    border-radius: 4px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .ctrl-btn:active { background: rgba(0,238,255,0.18); }

  .dpad {
    display: grid;
    grid-template-columns: repeat(3, 44px);
    grid-template-rows: repeat(3, 44px);
    gap: 4px;
  }
  .dpad .ctrl-btn { padding: 0; display:flex; align-items:center; justify-content:center; font-size:14px; }
  .dpad .empty { visibility: hidden; }

  @media (pointer: coarse) {
    #mobile-controls { display: flex; }
  }
</style>
</head>
<body>

<div id="game-wrapper">
  <div id="hud">
    <div>SCORE: <span id="score-display">0</span></div>
    <div>LV: <span id="level-display">1</span></div>
    <div class="lives">LIVES: <span id="lives-display">&#9829;&#9829;&#9829;</span></div>
  </div>

  <canvas id="c"></canvas>

  <div id="overlay">
    <h1 id="ol-title">SPACE Shooter</h1>
    <div class="big-score" id="ol-score" style="display:none"></div>
    <p id="ol-body">Use ARROW KEYS to move<br>SPACE to shoot<br>Collect power-ups!</p>
    <div class="blink" id="ol-press">PRESS SPACE TO START</div>
  </div>

  <div id="mobile-controls">
    <div class="dpad">
      <div class="empty"></div>
      <button class="ctrl-btn" id="btn-up">&#8679;</button>
      <div class="empty"></div>
      <button class="ctrl-btn" id="btn-left">&#8678;</button>
      <div class="empty"></div>
      <button class="ctrl-btn" id="btn-right">&#8680;</button>
      <div class="empty"></div>
      <button class="ctrl-btn" id="btn-down">&#8681;</button>
      <div class="empty"></div>
    </div>
    <button class="ctrl-btn" id="btn-fire" style="font-size:9px;padding:18px 22px;">FIRE</button>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const olTitle = document.getElementById('ol-title');
const olBody = document.getElementById('ol-body');
const olScore = document.getElementById('ol-score');
const olPress = document.getElementById('ol-press');
const scoreEl = document.getElementById('score-display');
const levelEl = document.getElementById('level-display');
const livesEl = document.getElementById('lives-display');

const W = 480, H = 300;
canvas.width = W; canvas.height = H;

// ─── Scale canvas on small screens ───
function resize() {
  const maxW = Math.min(window.innerWidth - 16, 600);
  const scale = Math.min(maxW / W, (window.innerHeight - 140) / H);
  canvas.style.width = (W * scale) + 'px';
  canvas.style.height = (H * scale) + 'px';
}
resize();
window.addEventListener('resize', resize);

// ─── State ───
let state = 'menu'; // menu | playing | dead | gameover
let score = 0, hiScore = 0, lives = 3, level = 1;
let frame = 0;
let paused = false;

// ─── Input ───
const keys = {};
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Space') {
    e.preventDefault();
    if (state === 'menu' || state === 'gameover') startGame();
    else if (state === 'dead') respawn();
  }
  if (e.code === 'ArrowUp' || e.code === 'ArrowDown') e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

// Mobile
function mobileBtn(id, code) {
  const btn = document.getElementById(id);
  if (!btn) return;
  btn.addEventListener('pointerdown', () => { keys[code] = true; });
  btn.addEventListener('pointerup', () => { keys[code] = false; });
  btn.addEventListener('pointercancel', () => { keys[code] = false; });
}
mobileBtn('btn-up', 'ArrowUp');
mobileBtn('btn-down', 'ArrowDown');
mobileBtn('btn-left', 'ArrowLeft');
mobileBtn('btn-right', 'ArrowRight');
document.getElementById('btn-fire').addEventListener('pointerdown', () => {
  if (state === 'menu' || state === 'gameover') startGame();
  else if (state === 'dead') respawn();
  else keys['Space'] = true;
});
document.getElementById('btn-fire').addEventListener('pointerup', () => { keys['Space'] = false; });

// ─── Stars ───
const STAR_LAYERS = [
  { count: 60, speed: 0.3, size: 1, alpha: 0.4 },
  { count: 30, speed: 0.7, size: 1.5, alpha: 0.65 },
  { count: 10, speed: 1.2, size: 2, alpha: 0.9 },
];
let stars = [];
function initStars() {
  stars = [];
  STAR_LAYERS.forEach(layer => {
    for (let i = 0; i < layer.count; i++) {
      stars.push({ x: Math.random() * W, y: Math.random() * H, layer });
    }
  });
}
function updateStars() {
  stars.forEach(s => {
    s.x -= s.layer.speed;
    if (s.x < 0) { s.x = W; s.y = Math.random() * H; }
  });
}
function drawStars() {
  stars.forEach(s => {
    ctx.globalAlpha = s.layer.alpha;
    ctx.fillStyle = '#fff';
    ctx.fillRect(Math.round(s.x), Math.round(s.y), s.layer.size, s.layer.size);
  });
  ctx.globalAlpha = 1;
}

// ─── Player ───
let player;
function makePlayer() {
  return {
    x: 60, y: H / 2 - 8,
    w: 28, h: 14,
    speed: 3.2,
    shootCooldown: 0,
    shootRate: 16,
    invincible: 0,
    shield: 0,
    rapidFire: 0,
    triShot: 0,
  };
}

function drawPlayer(p) {
  if (p.invincible > 0 && Math.floor(frame / 4) % 2 === 0) return;

  const x = Math.round(p.x), y = Math.round(p.y);

  // Shield ring
  if (p.shield > 0) {
    ctx.strokeStyle = '#88ffcc';
    ctx.lineWidth = 2;
    ctx.globalAlpha = 0.5 + 0.3 * Math.sin(frame * 0.15);
    ctx.beginPath();
    ctx.ellipse(x + p.w / 2, y + p.h / 2, p.w * 0.9, p.h * 1.1, 0, 0, Math.PI * 2);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }

  // Body
  ctx.fillStyle = '#44ddff';
  ctx.fillRect(x + 6, y + 4, 16, 6);
  ctx.fillRect(x + 14, y + 2, 10, 10);

  // Cockpit
  ctx.fillStyle = '#003344';
  ctx.fillRect(x + 18, y + 4, 5, 6);

  // Top wing
  ctx.fillStyle = '#2299bb';
  ctx.fillRect(x, y, 14, 4);
  ctx.fillRect(x + 2, y - 2, 6, 2);

  // Bottom wing
  ctx.fillRect(x, y + 10, 14, 4);
  ctx.fillRect(x + 2, y + 14, 6, 2);

  // Engine glow
  const glowAmt = 0.6 + 0.4 * Math.sin(frame * 0.3);
  ctx.fillStyle = `rgba(0,255,200,${glowAmt})`;
  ctx.fillRect(x + 4, y + 5, 4, 4);
  ctx.fillStyle = `rgba(255,255,100,${glowAmt * 0.7})`;
  ctx.fillRect(x + 2, y + 6, 3, 2);
}

// ─── Bullets ───
let bullets = [], enemyBullets = [];

function shoot(p) {
  if (p.shootCooldown > 0) return;
  const rate = p.rapidFire > 0 ? 7 : p.shootRate;
  p.shootCooldown = rate;

  const cy = p.y + p.h / 2 - 1;
  if (p.triShot > 0) {
    bullets.push({ x: p.x + p.w, y: cy - 4, vy: -0.8, w: 7, h: 2 });
    bullets.push({ x: p.x + p.w, y: cy, vy: 0, w: 7, h: 2 });
    bullets.push({ x: p.x + p.w, y: cy + 4, vy: 0.8, w: 7, h: 2 });
  } else {
    bullets.push({ x: p.x + p.w, y: cy, vy: 0, w: 7, h: 2 });
  }
}

function drawBullets() {
  bullets.forEach(b => {
    ctx.fillStyle = '#00ffcc';
    ctx.shadowBlur = 4; ctx.shadowColor = '#00ffcc';
    ctx.fillRect(Math.round(b.x), Math.round(b.y), b.w, b.h);
  });
  enemyBullets.forEach(b => {
    ctx.fillStyle = '#ff8800';
    ctx.shadowBlur = 4; ctx.shadowColor = '#ff8800';
    ctx.fillRect(Math.round(b.x), Math.round(b.y), b.w, b.h);
  });
  ctx.shadowBlur = 0;
}

// ─── Enemies ───
let enemies = [];
const ENEMY_TYPES = [
  { id: 'scout',   w: 18, h: 10, hp: 1, score: 10, speed: 1.8, color: '#ff4466', shootChance: 0.003 },
  { id: 'fighter', w: 22, h: 12, hp: 2, score: 25, speed: 1.3, color: '#ff6633', shootChance: 0.006 },
  { id: 'bomber',  w: 28, h: 16, hp: 4, score: 50, speed: 0.8, color: '#cc2288', shootChance: 0.012 },
  { id: 'cruiser', w: 36, h: 20, hp: 8, score: 100, speed: 0.6, color: '#8800ff', shootChance: 0.015 },
];

function spawnEnemy() {
  const lvl = Math.min(level, 4);
  const pool = ENEMY_TYPES.slice(0, lvl);
  const weights = [4, 3, 2, 1].slice(0, lvl);
  const total = weights.reduce((a, b) => a + b, 0);
  let r = Math.random() * total;
  let type = pool[0];
  for (let i = 0; i < pool.length; i++) {
    r -= weights[i];
    if (r <= 0) { type = pool[i]; break; }
  }
  const t = { ...type };
  const pattern = Math.random();
  let vy = 0, phase = Math.random() * Math.PI * 2;
  if (pattern < 0.3) vy = (Math.random() - 0.5) * 1.5; // diagonal
  const y = Math.random() * (H - t.h - 10) + 5;
  enemies.push({
    ...t,
    x: W + 10, y,
    startY: y,
    vx: -(t.speed + (level - 1) * 0.15),
    vy, phase,
    wave: pattern > 0.5,
    hp: t.hp + Math.floor((level - 1) * 0.5),
    maxHp: t.hp + Math.floor((level - 1) * 0.5),
    hitFlash: 0,
  });
}

function drawEnemy(e) {
  const x = Math.round(e.x), y = Math.round(e.y);
  const flash = e.hitFlash > 0;
  const col = flash ? '#ffffff' : e.color;

  ctx.fillStyle = col;
  if (e.id === 'scout') {
    ctx.fillRect(x, y + 3, 14, 4);
    ctx.fillRect(x + 6, y, 8, 10);
    ctx.fillRect(x + 12, y + 2, 6, 6);
    ctx.fillStyle = '#ff0000';
    ctx.fillRect(x + 0, y + 3, 4, 4);
  } else if (e.id === 'fighter') {
    ctx.fillRect(x, y + 4, 18, 4);
    ctx.fillRect(x + 6, y + 1, 12, 10);
    ctx.fillRect(x + 14, y + 3, 8, 6);
    ctx.fillRect(x, y, 8, 3);
    ctx.fillRect(x, y + 9, 8, 3);
    ctx.fillStyle = '#ffaa00';
    ctx.fillRect(x, y + 4, 3, 4);
  } else if (e.id === 'bomber') {
    ctx.fillRect(x + 2, y + 6, 22, 4);
    ctx.fillRect(x + 8, y + 2, 16, 12);
    ctx.fillRect(x + 18, y + 4, 10, 8);
    ctx.fillRect(x, y + 4, 10, 3);
    ctx.fillRect(x, y + 9, 10, 3);
    ctx.fillStyle = '#ff00ff';
    ctx.fillRect(x + 2, y + 5, 4, 6);
  } else {
    ctx.fillRect(x + 4, y + 8, 28, 4);
    ctx.fillRect(x + 12, y + 3, 20, 14);
    ctx.fillRect(x + 24, y + 5, 12, 10);
    ctx.fillRect(x, y + 5, 16, 4);
    ctx.fillRect(x, y + 11, 16, 4);
    ctx.fillStyle = '#ffff00';
    ctx.fillRect(x + 4, y + 7, 6, 6);
  }

  // HP bar
  if (e.maxHp > 1) {
    const bw = e.w, bh = 3;
    ctx.fillStyle = '#333';
    ctx.fillRect(x, y - 5, bw, bh);
    ctx.fillStyle = e.hp / e.maxHp > 0.5 ? '#44ff44' : e.hp / e.maxHp > 0.25 ? '#ffaa00' : '#ff2222';
    ctx.fillRect(x, y - 5, Math.round(bw * e.hp / e.maxHp), bh);
  }

  if (e.hitFlash > 0) e.hitFlash--;
}

// ─── Power-ups ───
let powerups = [];
const PU_TYPES = ['rapid', 'triple', 'shield', 'life'];
function spawnPowerup(x, y) {
  if (Math.random() > 0.22) return;
  const type = PU_TYPES[Math.floor(Math.random() * PU_TYPES.length)];
  powerups.push({ x, y, type, vy: (Math.random() - 0.5) * 0.6, phase: Math.random() * Math.PI * 2 });
}
const PU_COLORS = { rapid: '#ffcc00', triple: '#00eeff', shield: '#88ffcc', life: '#ff3366' };
const PU_LABELS = { rapid: 'R', triple: 'T', shield: 'S', life: '♥' };

function drawPowerup(p) {
  const x = Math.round(p.x), y = Math.round(p.y);
  const glow = 0.6 + 0.4 * Math.sin(frame * 0.12 + p.phase);
  ctx.fillStyle = PU_COLORS[p.type];
  ctx.globalAlpha = glow;
  ctx.shadowBlur = 8; ctx.shadowColor = PU_COLORS[p.type];
  ctx.fillRect(x, y, 14, 14);
  ctx.globalAlpha = 1;
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#000';
  ctx.font = 'bold 9px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(PU_LABELS[p.type], x + 7, y + 10);
  ctx.textAlign = 'left';
}

// ─── Particles / Explosions ───
let particles = [];
function explode(x, y, count, col) {
  for (let i = 0; i < count; i++) {
    const ang = Math.random() * Math.PI * 2;
    const spd = 0.5 + Math.random() * 3;
    particles.push({
      x, y,
      vx: Math.cos(ang) * spd, vy: Math.sin(ang) * spd,
      life: 20 + Math.random() * 20,
      maxLife: 40,
      col: col || '#ff8844',
      size: 1 + Math.random() * 2,
    });
  }
}
function updateParticles() {
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    p.vx *= 0.95; p.vy *= 0.95;
    p.life--;
  });
}
function drawParticles() {
  particles.forEach(p => {
    ctx.globalAlpha = p.life / p.maxLife;
    ctx.fillStyle = p.col;
    ctx.fillRect(Math.round(p.x), Math.round(p.y), p.size, p.size);
  });
  ctx.globalAlpha = 1;
}

// ─── Collision ───
function rectsOverlap(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x &&
         a.y < b.y + b.h && a.y + a.h > b.y;
}

// ─── Game logic ───
let spawnTimer = 0, spawnRate = 80;
let levelScore = 0, levelTarget = 200;

function startGame() {
  score = 0; lives = 3; level = 1;
  levelScore = 0; levelTarget = 200;
  player = makePlayer();
  enemies = []; bullets = []; enemyBullets = [];
  powerups = []; particles = [];
  spawnTimer = 0; spawnRate = 80; frame = 0;
  state = 'playing';
  overlay.classList.add('hidden');
  updateHUD();
}

function respawn() {
  player = makePlayer();
  player.invincible = 120;
  enemies = []; bullets = []; enemyBullets = [];
  powerups = [];
  state = 'playing';
  overlay.classList.add('hidden');
}

function updateHUD() {
  scoreEl.textContent = score;
  levelEl.textContent = level;
  livesEl.innerHTML = '♥'.repeat(lives) || '—';
}

function playerDied() {
  explode(player.x + player.w / 2, player.y + player.h / 2, 40, '#00eeff');
  lives--;
  updateHUD();
  if (lives <= 0) {
    if (score > hiScore) hiScore = score;
    state = 'gameover';
    overlay.classList.remove('hidden');
    olTitle.textContent = 'GAME OVER';
    olScore.style.display = 'block';
    olScore.textContent = `SCORE: ${score}  HI: ${hiScore}`;
    olBody.innerHTML = '';
    olPress.textContent = 'PRESS SPACE TO RETRY';
  } else {
    state = 'dead';
    overlay.classList.remove('hidden');
    olTitle.textContent = 'SHIP LOST';
    olScore.style.display = 'block';
    olScore.textContent = `LIVES: ${'♥'.repeat(lives)}`;
    olBody.innerHTML = '';
    olPress.textContent = 'PRESS SPACE TO CONTINUE';
  }
}

function update() {
  frame++;

  updateStars();

  if (state !== 'playing') return;

  // Player movement
  const p = player;
  if (keys['ArrowUp'] || keys['KeyW']) p.y -= p.speed;
  if (keys['ArrowDown'] || keys['KeyS']) p.y += p.speed;
  if (keys['ArrowLeft'] || keys['KeyA']) p.x -= p.speed * 0.7;
  if (keys['ArrowRight'] || keys['KeyD']) p.x += p.speed * 0.7;
  p.x = Math.max(0, Math.min(W - p.w, p.x));
  p.y = Math.max(0, Math.min(H - p.h, p.y));

  if (p.shootCooldown > 0) p.shootCooldown--;
  if (keys['Space'] || keys['KeyZ']) shoot(p);

  if (p.invincible > 0) p.invincible--;
  if (p.rapidFire > 0) p.rapidFire--;
  if (p.triShot > 0) p.triShot--;
  if (p.shield > 0) p.shield--;

  // Bullets
  bullets = bullets.filter(b => b.x < W + 10);
  bullets.forEach(b => { b.x += 7; b.y += b.vy; });

  enemyBullets = enemyBullets.filter(b => b.x > -10 && b.y > -10 && b.y < H + 10);
  enemyBullets.forEach(b => { b.x += b.vx; b.y += b.vy; });

  // Spawn enemies
  spawnTimer++;
  const sr = Math.max(30, spawnRate - level * 6);
  if (spawnTimer >= sr) { spawnTimer = 0; spawnEnemy(); }

  // Update enemies
  enemies = enemies.filter(e => e.x > -50);
  enemies.forEach(e => {
    e.x += e.vx;
    if (e.wave) e.y = e.startY + Math.sin(frame * 0.04 + e.phase) * 30;
    else e.y += e.vy;
    e.y = Math.max(2, Math.min(H - e.h - 2, e.y));
    if (e.startY !== undefined && !e.wave) e.startY = e.y;

    // Enemy shooting
    if (Math.random() < e.shootChance * (1 + (level - 1) * 0.3)) {
      const dx = p.x - e.x, dy = (p.y + p.h / 2) - (e.y + e.h / 2);
      const dist = Math.sqrt(dx * dx + dy * dy) || 1;
      const spd = 2.5 + level * 0.2;
      enemyBullets.push({
        x: e.x, y: e.y + e.h / 2,
        vx: dx / dist * spd, vy: dy / dist * spd,
        w: 5, h: 2
      });
    }
  });

  // Power-ups
  powerups = powerups.filter(pu => pu.x > -20);
  powerups.forEach(pu => { pu.x -= 1.2; pu.y += pu.vy; pu.y = Math.max(2, Math.min(H - 16, pu.y)); });

  // Bullet vs enemy
  bullets.forEach(b => {
    enemies.forEach(e => {
      if (rectsOverlap(b, e)) {
        b.dead = true;
        e.hp--;
        e.hitFlash = 6;
        if (e.hp <= 0) {
          e.dead = true;
          score += e.score;
          levelScore += e.score;
          updateHUD();
          explode(e.x + e.w / 2, e.y + e.h / 2, 15 + e.maxHp * 3, e.color);
          spawnPowerup(e.x, e.y + e.h / 2);
        }
      }
    });
  });
  bullets = bullets.filter(b => !b.dead);
  enemies = enemies.filter(e => !e.dead);

  // Enemy bullet vs player
  if (p.invincible <= 0) {
    enemyBullets.forEach(b => {
      if (rectsOverlap(b, { x: p.x + 4, y: p.y + 2, w: p.w - 6, h: p.h - 4 })) {
        b.dead = true;
        if (p.shield > 0) {
          p.shield = 0;
          explode(b.x, b.y, 6, '#88ffcc');
        } else {
          p.invincible = 80;
          playerDied();
        }
      }
    });
    enemyBullets = enemyBullets.filter(b => !b.dead);

    // Enemy vs player collision
    if (state === 'playing') {
      enemies.forEach(e => {
        if (rectsOverlap({ x: p.x + 4, y: p.y + 2, w: p.w - 8, h: p.h - 4 }, e)) {
          e.dead = true;
          if (p.shield > 0) { p.shield = 0; explode(e.x, e.y, 10, '#88ffcc'); }
          else { p.invincible = 80; playerDied(); }
        }
      });
      enemies = enemies.filter(e => !e.dead);
    }
  }

  // Player vs powerup
  powerups.forEach(pu => {
    if (rectsOverlap(p, { x: pu.x, y: pu.y, w: 14, h: 14 })) {
      pu.dead = true;
      if (pu.type === 'rapid') p.rapidFire = 300;
      else if (pu.type === 'triple') p.triShot = 300;
      else if (pu.type === 'shield') p.shield = 400;
      else if (pu.type === 'life' && lives < 5) { lives++; updateHUD(); }
      explode(pu.x + 7, pu.y + 7, 10, PU_COLORS[pu.type]);
    }
  });
  powerups = powerups.filter(pu => !pu.dead);

  updateParticles();

  // Level up
  if (levelScore >= levelTarget) {
    levelScore = 0;
    level++;
    levelTarget = Math.round(levelTarget * 1.4);
    updateHUD();
    // Flash the level
    for (let i = 0; i < 30; i++) {
      setTimeout(() => explode(Math.random() * W, Math.random() * H, 6, '#ffcc00'), i * 60);
    }
  }
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#000008';
  ctx.fillRect(0, 0, W, H);

  drawStars();
  drawParticles();

  powerups.forEach(drawPowerup);
  enemies.forEach(drawEnemy);

  if (state === 'playing' || state === 'dead' || state === 'gameover') {
    drawBullets();
    if (state === 'playing') drawPlayer(player);
  }

  // Power-up status bar
  if (state === 'playing') {
    const p = player;
    let px = 4, py = H - 6;
    const drawStatus = (label, time, col) => {
      if (time <= 0) return;
      ctx.fillStyle = col;
      ctx.font = '6px monospace';
      ctx.fillText(`${label}:${Math.ceil(time / 60)}s`, px, py);
      px += 50;
    };
    drawStatus('RAPID', p.rapidFire, '#ffcc00');
    drawStatus('TRI', p.triShot, '#00eeff');
    drawStatus('SHIELD', p.shield, '#88ffcc');
  }
}

// ─── Menu screen ───
function showMenu() {
  olTitle.textContent = 'SPACE Shooter';
  olScore.style.display = 'none';
  olBody.innerHTML = 'ARROW KEYS — move<br>SPACE — fire<br><br>Collect power-ups!<br>Survive as long as you can!';
  olPress.textContent = 'PRESS SPACE TO START';
}

// ─── Loop ───
initStars();
showMenu();

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
